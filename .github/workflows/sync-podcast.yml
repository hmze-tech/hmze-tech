name: Sync podcast episodes

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install xml2js he

      - name: Generate missing episode posts
        run: node scripts/sync-podcast.js

      - name: Check for new posts
        id: changes
        run: |
          git add _posts
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new episodes found."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "New episodes detected."
          fi

      - name: Commit new posts
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: add new podcast episodes"

      - name: Push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: git push