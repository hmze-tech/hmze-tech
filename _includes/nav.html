<header class="site-header" role="banner">
  <div class="site-header__inner">

    <!--
      Logo: left column.
      Treatment: JPEG image (logo_2026_v1.jpeg). Figma node 2:1921 contains
      a vector asset — replace <img> with inline SVG once export is available
      so it can inherit color in dark/light contexts.
    -->
    <a class="site-header__logo" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} — Home">
      <img src="{{ '/assets/img/logo_2026_v1.jpeg' | relative_url }}"
           alt="{{ site.title }}"
           width="165" height="69">
    </a>

    <!--
      Nav: center column — social platform links in a pill.
      Links are data-driven from _data/social.yml.
      Mobile behavior: pill stays visible; wordmark collapses on narrow viewports.
      No hamburger: the nav contains only 4 icon-sized links that comfortably
      fit on any screen width — see components.css for responsive rules.
    -->
    <nav class="site-nav" aria-label="Listen on">

      <!--
        Progress indicator: decorative "now playing" scrubber.
        Static at 35% — requires JS + audio player integration to be functional.
        Hidden on mobile (< 768px) via components.css media query.
      -->
      <div class="site-nav__progress" aria-hidden="true">
        <div class="site-nav__progress-caret"></div>
        <div class="site-nav__progress-track">
          <div class="site-nav__progress-fill"></div>
        </div>
      </div>

      <div class="site-nav__pill">
        {% for platform in site.data.social %}
        <a class="social-icons__link"
           href="{{ platform.url }}"
           aria-label="{{ platform.label }}"
           target="_blank" rel="noopener noreferrer">
          <img src="{{ platform.icon | relative_url }}" alt="" width="36" height="36">
        </a>
        {% endfor %}
      </div>

    </nav>

    <!--
      Wordmark: right column — "HMZE × IMPALA SEARCH".
      TODO: Replace with inline SVG from Figma node 2:1901 (typography as outlines).
      The × color (#e85d2f) is estimated from screenshots — confirm with designer.
      Hidden on viewports < 640px via components.css media query.
    -->
    <div class="site-header__wordmark" aria-label="HMZE × Impala Search">
      <span class="site-header__wordmark-text">
        HMZE <span class="site-header__wordmark-x">×</span> IMPALA SEARCH
      </span>
    </div>

  </div>
</header>
