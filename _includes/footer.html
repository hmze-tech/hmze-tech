<footer class="site-footer" role="contentinfo">

  <div class="site-footer__card">

    <!-- Left: internal page navigation with active-state detection -->
    <nav class="site-footer__nav" aria-label="Footer navigation">
      <a class="site-footer__nav-link{% if page.url == '/' %} is-active{% endif %}"
         href="{{ '/' | relative_url }}">latest episodes</a>
      <a class="site-footer__nav-link{% if page.url contains '/archive' %} is-active{% endif %}"
         href="{{ '/archive/' | relative_url }}">episode archive</a>
    </nav>

    <!--
      Center: brand lockup.
      TODO: Replace with SVG export from Figma node 2:1984 ("Group 15" — the
      "beyond / [vibe_coding] HMZE × IMPALA SEARCH" vector lockup with orange
      vertical accent line). Using logo image as placeholder until export is ready.
    -->
    <div class="site-footer__lockup">
      <img src="{{ '/assets/img/logo_2026_v1.jpeg' | relative_url }}"
           alt="{{ site.title }}"
           width="280" height="118">
    </div>

    <!-- Right: social platform icons, data-driven from _data/social.yml -->
    <div class="site-footer__social social-icons">
      {% for platform in site.data.social %}
      <a class="social-icons__link"
         href="{{ platform.url }}"
         aria-label="{{ platform.label }}"
         target="_blank" rel="noopener noreferrer">
        <img src="{{ platform.icon | relative_url }}" alt="" width="36" height="36">
      </a>
      {% endfor %}
    </div>

  </div>

  <p class="site-footer__copyright">
    &copy; {{ 'now' | date: "%Y" }} HMZE &times; Impala Search
  </p>

</footer>
