<footer class="site-footer" role="contentinfo">

  <div class="site-footer__card">

    <!-- Left: navigation links -->
    <nav class="site-footer__nav" aria-label="Footer navigation">
      <a class="site-footer__nav-link" href="{{ '/' | relative_url }}">latest episodes</a>
      <a class="site-footer__nav-link" href="{{ '/archive/' | relative_url }}">episode archive</a>
    </nav>

    <!-- Center: logo / lockup -->
    <!--
      TODO: Replace with SVG export from Figma (node 2:1984 "Group 15" in the
      landing page frame). This is the "beyond / [vibe_coding] HMZE × IMPALA SEARCH"
      vector lockup with the orange vertical accent line. Until the export is
      available, we use the existing logo image as a placeholder.
    -->
    <div class="site-footer__lockup">
      <img src="{{ '/assets/img/logo_2026_v1.jpeg' | relative_url }}"
           alt="{{ site.title }}"
           width="280">
    </div>

    <!-- Right: social platform icons -->
    <div class="site-footer__social social-icons">
      <a class="social-icons__link"
         href="https://open.spotify.com/show/5wgcluRAVV7zEa9Zo4po5B"
         aria-label="Listen on Spotify"
         target="_blank" rel="noopener noreferrer">
        <img src="{{ '/assets/img/icons/spotify.svg' | relative_url }}" alt="" width="36" height="36">
      </a>
      <a class="social-icons__link"
         href="https://podcasts.apple.com/de/podcast/hmze/id1869935041"
         aria-label="Listen on Apple Podcasts"
         target="_blank" rel="noopener noreferrer">
        <img src="{{ '/assets/img/icons/apple-podcasts.svg' | relative_url }}" alt="" width="36" height="36">
      </a>
      <a class="social-icons__link"
         href="https://www.youtube.com/@HMZE-BeyondVibeCoding"
         aria-label="Watch on YouTube"
         target="_blank" rel="noopener noreferrer">
        <img src="{{ '/assets/img/icons/youtube.svg' | relative_url }}" alt="" width="36" height="36">
      </a>
      <a class="social-icons__link"
         href="https://www.linkedin.com/company/73990683/"
         aria-label="Follow on LinkedIn"
         target="_blank" rel="noopener noreferrer">
        <img src="{{ '/assets/img/icons/linkedin.svg' | relative_url }}" alt="" width="36" height="36">
      </a>
    </div>

  </div>

  <!-- Copyright line below the card -->
  <p class="site-footer__copyright">
    &copy; {{ 'now' | date: "%Y" }} HMZE &times; Impala Search
  </p>

</footer>
